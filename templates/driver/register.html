{% extends "base.html" %}

{% block title %}Driver Registration | LoadLink{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto glass-panel p-8 fade-in-up mb-10">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-moss">Join LoadLink Fleet</h2>
        <p class="text-gray-500 mt-2">Partner with us for sustainable logistics.</p>
    </div>

    <form action="{{ url_for('driver.register') }}" method="POST" class="space-y-8">
        
        <!-- Personal Information -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <h3 class="text-xl font-semibold mb-4 text-gray-800">Personal Information</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" name="name" required class="input-field" placeholder="Enter your name">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                    <input type="tel" name="phone" required class="input-field" placeholder="Enter your phone number">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Date of Birth</label>
                    <input type="date" name="dob" required class="input-field">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
                    <input type="text" name="city" required class="input-field" placeholder="Enter your city">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Address</label>
                    <input type="text" name="address" required class="input-field" placeholder="Enter your address">
                </div>
            </div>
        </div>

        <!-- Professional Information -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <h3 class="text-xl font-semibold mb-4 text-gray-800">Professional Information</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Driving License Number</label>
                    <input type="text" name="license_number" required class="input-field" placeholder="DL-123456789">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Vehicle Brand</label>
                    <input type="text" name="vehicle_brand" required class="input-field" placeholder="E.g., Ford">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Vehicle Model</label>
                    <input type="text" name="vehicle_model" required class="input-field" placeholder="E.g., Transit">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Max Payload Capacity (kg)</label>
                    <input type="number" name="vehicle_capacity" min="50" required class="input-field" placeholder="E.g., 1500">
                    <p class="text-xs text-gray-500 mt-1">AI will use this capacity to group orders safely.</p>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-primary w-full py-4 rounded-xl font-bold text-lg shadow-md hover:-translate-y-1 transition duration-300">
            Register as Driver
        </button>
    </form>
</div>
{% endblock %}
